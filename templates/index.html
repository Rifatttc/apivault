<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-6">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-center">APIVault</h1>

        <!-- Add Form -->
        <div class="bg-zinc-900 p-6 rounded-2xl mb-8">
            <h2 class="text-xl mb-4">Add New API</h2>
            <form id="addForm" class="space-y-4">
                <input type="text" id="name" placeholder="API Name" class="w-full p-3 bg-zinc-800 rounded-lg" required>
                <input type="url" id="url" placeholder="Full URL" class="w-full p-3 bg-zinc-800 rounded-lg" required>
                <button type="submit" class="w-full bg-green-600 py-3 rounded-lg font-medium">Save API</button>
            </form>
        </div>

        <!-- List -->
        <div class="bg-zinc-900 p-6 rounded-2xl">
            <h2 class="text-xl mb-4">Saved APIs</h2>
            <div id="apiList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        async function loadAPIs() {
            const res = await fetch('/apis/');
            const apis = await res.json();
            let html = '';
            apis.forEach(api => {
                html += `
                    <div class="bg-zinc-800 p-4 rounded-xl flex justify-between items-center">
                        <div>
                            <div class="font-medium">${api.name}</div>
                            <a href="\( {api.url}" target="_blank" class="text-blue-400 text-sm break-all"> \){api.url}</a>
                        </div>
                        <button onclick="deleteAPI(${api.id})" class="text-red-500">Delete</button>
                    </div>`;
            });
            document.getElementById('apiList').innerHTML = html || '<p class="text-gray-500">No APIs saved yet.</p>';
        }

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                url: document.getElementById('url').value,
                method: "GET",
                category: "General"
            };
            await fetch('/apis/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            document.getElementById('addForm').reset();
            loadAPIs();
        });

        async function deleteAPI(id) {
            if (confirm('Delete this API?')) {
                await fetch(`/apis/${id}`, { method: 'DELETE' });
                loadAPIs();
            }
        }

        window.onload = loadAPIs;
    </script>
</body>
</html>
