<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">APIVault - API Manager</h1>

        <!-- Add API Form -->
        <div class="bg-white p-6 rounded-xl shadow mb-8">
            <h2 class="font-semibold mb-4">Add New API</h2>
            <form id="form" class="grid grid-cols-2 gap-4">
                <input type="text" id="name" placeholder="API Name" class="border p-2 rounded" required>
                <input type="url" id="url" placeholder="API URL" class="border p-2 rounded" required>
                <select id="method" class="border p-2 rounded">
                    <option>GET</option>
                    <option>POST</option>
                    <option>PUT</option>
                    <option>DELETE</option>
                </select>
                <input type="text" id="category" value="General" class="border p-2 rounded">
                <button type="submit" class="col-span-2 bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                    Save API
                </button>
            </form>
        </div>

        <!-- API List -->
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="font-semibold mb-4">Saved APIs</h2>
            <div id="list"></div>
        </div>
    </div>

    <script>
        async function loadAPIs() {
            const res = await fetch('/apis/');
            const data = await res.json();
            let html = '';
            data.forEach(api => {
                html += `
                    <div class="border p-3 mb-2 rounded flex justify-between">
                        <div>
                            <strong>${api.name}</strong> 
                            <span class="text-xs px-2 py-0.5 bg-gray-200 rounded">${api.method}</span><br>
                            <a href="\( {api.url}" target="_blank" class="text-blue-600 text-sm"> \){api.url}</a>
                        </div>
                        <button onclick="deleteAPI(${api.id})" class="text-red-500">Delete</button>
                    </div>
                `;
            });
            document.getElementById('list').innerHTML = html || '<p class="text-gray-500">No APIs yet.</p>';
        }

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                url: document.getElementById('url').value,
                method: document.getElementById('method').value,
                category: document.getElementById('category').value
            };
            await fetch('/apis/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            document.getElementById('form').reset();
            loadAPIs();
        });

        async function deleteAPI(id) {
            if (!confirm('Delete this API?')) return;
            await fetch(`/apis/${id}`, { method: 'DELETE' });
            loadAPIs();
        }

        window.onload = loadAPIs;
    </script>
</body>
</html>
